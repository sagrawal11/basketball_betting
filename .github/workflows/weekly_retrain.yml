name: Weekly Full Retrain

# Weekly, HEAVY path: rebuild features for active players and retrain the hybrid
# models, then delta-upload to R2. Runs Sundays after the daily refresh. The long
# timeout reflects full per-player residual + global LightGBM training on a free
# 2-core runner; weekly cadence keeps it within the free Actions tier. Daily
# predictions (warmed by nightly_pipeline.yml) use the most recent weekly models.

on:
  schedule:
    - cron: '0 9 * * 0'   # Sundays 09:00 UTC, after the 08:00 daily refresh
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r config/requirements.txt

      - name: Download dataset from R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          cd backend
          python -c "
          from utils.storage import download_full_training_bundle
          import os
          bucket = os.environ.get('R2_BUCKET_NAME')
          if bucket:
              download_full_training_bundle(bucket)
          else:
              print('R2_BUCKET_NAME not set')
          "

      - name: Full retrain (features + hybrid models)
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          UPSTASH_REDIS_URL: ${{ secrets.UPSTASH_REDIS_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          cd backend
          python pipeline/nightly.py --rebuild-features --retrain-global
